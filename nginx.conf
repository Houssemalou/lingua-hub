server {
  listen 80;
  server_name learnup.tn www.learnup.tn;

  # Redirect HTTP to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name learnup.tn www.learnup.tn;

  ssl_certificate /etc/letsencrypt/live/learnup.tn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/learnup.tn/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Serve static files, fallback to index.html for SPA routes
  location /super-admin {
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to backend container
  location /api/ {
    proxy_pass http://backend:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_path / /;
  }

  # Proxy AI assistant service
  location /assistant/ {
    proxy_pass http://python-service:3200/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # LiveKit WebSocket
  location /rtc {
    proxy_pass http://livekit:7880;           # LiveKit container interne
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;   # essentiel pour WS
    proxy_set_header Connection "upgrade";    # essentiel pour WS
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  gzip on;
  gzip_types text/plain application/javascript application/json text/css application/xml;
}